[workspace]
release = false

[[package]]
name = "delta-funnel"
release = true
changelog_path = "CHANGELOG.md"
changelog_include = ["delta-funnel-python"]

[[package]]
name = "delta-funnel-python"
release = true
publish = false
git_only = true
# The Python bindings are not published or tagged separately. Use the real
# crate tag family so release-plz starts from the latest crate release.
git_tag_name = "delta-funnel-v{{ version }}"
git_tag_enable = false
git_release_enable = false
changelog_update = false
semver_check = false
