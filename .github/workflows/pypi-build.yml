name: Build PyPI wheels

on:
  workflow_call:
    inputs:
      publish_to:
        description: "Publish target"
        required: false
        type: string
        default: none
      version:
        description: "Expected package version, such as 0.1.0 or v0.1.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} wheel
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            manylinux: "2_28"
            interpreter: python3.10
            artifact: deltafunnel-linux-x86_64-wheel
            maturin_sccache: "true"
            host_sccache: "false"
          - name: Windows x86_64
            os: windows-latest
            manylinux: "off"
            interpreter: python
            artifact: deltafunnel-windows-x86_64-wheel
            maturin_sccache: "false"
            host_sccache: "true"
          - name: macOS arm64
            os: macos-latest
            manylinux: "off"
            interpreter: python
            artifact: deltafunnel-macos-arm64-wheel
            maturin_sccache: "false"
            host_sccache: "true"
          - name: macOS x86_64
            os: macos-15-intel
            manylinux: "off"
            interpreter: python
            artifact: deltafunnel-macos-x86_64-wheel
            maturin_sccache: "false"
            host_sccache: "true"
    env:
      PUBLISH_TO: ${{ github.event_name == 'release' && 'pypi' || inputs.publish_to || 'none' }}
      RELEASE_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
      CARGO_INCREMENTAL: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: ${{ matrix.host_sccache == 'true' && 'sccache' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check release version
        id: package-version
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"

          if [ "$PUBLISH_TO" != "none" ]; then
            requested="${RELEASE_VERSION#delta-funnel-v}"
            requested="${requested#v}"
            if [ -z "$requested" ]; then
              echo "version is required when publishing"
              exit 1
            fi
            if [ "$requested" != "$version" ]; then
              echo "requested version $requested does not match workspace version $version"
              exit 1
            fi
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Set up build Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pypi-${{ matrix.artifact }}

      - name: Set up sccache
        if: matrix.host_sccache == 'true'
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          rust-toolchain: ${{ steps.rust-version.outputs.version }}
          manylinux: ${{ matrix.manylinux }}
          sccache: ${{ matrix.maturin_sccache }}
          before-script-linux: dnf install -y openssl-devel
          args: >-
            --release
            --out dist
            --manifest-path crates/delta-funnel-python/Cargo.toml
            --compatibility pypi
            -i ${{ matrix.interpreter }}

      - name: Reset Linux cache ownership
        if: matrix.maturin_sccache == 'true'
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          if [ -d target ]; then
            sudo chown -R "$USER:$(id -gn)" target
          fi

      - name: Set up smoke-test Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Verify wheels
        run: |
          python - <<'PY'
          import email.parser
          import sys
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("no wheels built")

          required = {"deltafunnel/__init__.pyi", "deltafunnel/py.typed"}
          expected_version = "${{ steps.package-version.outputs.version }}"
          abi3_wheel = None

          for wheel_path in wheels:
              with zipfile.ZipFile(wheel_path) as wheel:
                  names = set(wheel.namelist())
                  metadata_files = [
                      name for name in names if name.endswith(".dist-info/METADATA")
                  ]
                  native_modules = [
                      name
                      for name in names
                      if name.startswith("deltafunnel/")
                      and (name.endswith(".so") or name.endswith(".pyd"))
                  ]

                  missing = sorted(required - names)
                  if missing:
                      raise SystemExit(
                          f"{wheel_path.name}: missing wheel entries: {', '.join(missing)}"
                      )
                  if len(metadata_files) != 1:
                      raise SystemExit(f"{wheel_path.name}: expected exactly one METADATA file")
                  if not native_modules:
                      raise SystemExit(f"{wheel_path.name}: missing native extension module")

                  metadata = email.parser.Parser().parsestr(
                      wheel.read(metadata_files[0]).decode()
                  )
                  if metadata["Name"] != "deltafunnel":
                      raise SystemExit(f"{wheel_path.name}: unexpected package name")
                  if metadata["Version"] != expected_version:
                      raise SystemExit(f"{wheel_path.name}: unexpected package version")

              if "abi3" in wheel_path.name:
                  abi3_wheel = wheel_path

          if abi3_wheel is None:
              raise SystemExit("missing abi3 wheel for import smoke test")

          print(abi3_wheel)
          PY

          abi3_wheel="$(python - <<'PY'
          from pathlib import Path
          print(next(Path("dist").glob("*abi3*.whl")))
          PY
          )"
          python -m pip install "$abi3_wheel"
          python - <<'PY'
          import deltafunnel

          session = deltafunnel.Session()
          assert repr(session).startswith("deltafunnel.Session(")
          print(deltafunnel.__version__)
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error
