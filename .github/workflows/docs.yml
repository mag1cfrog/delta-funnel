name: Docs

on:
  pull_request:
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs-site/requirements.txt

      - name: Install docs dependencies
        run: python -m pip install -r docs-site/requirements.txt

      - name: Build docs
        run: python -m zensical build --strict -f docs-site/mkdocs.yml

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/site

  deploy:
    name: Deploy Docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
