name: Core CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  SCCACHE_GHA_RW_MODE: READ_ONLY

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      diagnostics: ${{ steps.filter.outputs.diagnostics }}
      release_wheel: ${{ steps.filter.outputs.release_wheel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: .github/path-filters.json

      - name: Check diagnostics path routing
        run: node tools/ci/check-diagnostics-routing.mjs

  rust:
    name: Rust Checks / ${{ matrix.task }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: >-
          ${{
            fromJSON(
              needs.changes.outputs.diagnostics == 'true'
              && '["Default Tests","All Features","Lints and Docs"]'
              || '["Default Tests","Lints and Docs"]'
            )
          }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal --component rustfmt,clippy
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-ci
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check formatting
        if: matrix.task == 'Lints and Docs'
        run: cargo fmt --all --check

      - name: Test workspace
        if: matrix.task == 'Default Tests'
        run: cargo test --workspace

      - name: Test workspace with all features
        if: matrix.task == 'All Features'
        run: cargo test --workspace --all-targets --all-features

      - name: Lint workspace
        if: matrix.task == 'Lints and Docs'
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check Rust API documentation
        if: matrix.task == 'Lints and Docs'
        run: |
          cargo doc --workspace --no-deps
          test ! -e target/doc/delta_funnel/progress/index.html
          if rg --quiet 'ProgressReporter|delta_lake_with_progress|preview_table_with_progress|dry_run_to_mssql_with_progress|dry_run_all_to_mssql_with_progress|write_to_mssql_with_progress|write_all_with_progress|write_all_for_stream_benchmark' target/doc/delta_funnel; then
            echo "hidden host integration API appeared in normal rustdoc"
            exit 1
          fi

      - name: Check whitespace
        if: matrix.task == 'Lints and Docs'
        run: git diff --check

  python-package:
    name: Python Package
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-ci
          save-if: ${{ github.event_name != 'pull_request' }}

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: crates/delta-funnel-python/pyproject.toml

      - name: Install Python build tooling
        run: python -m pip install "maturin>=1.13,<2"

      - name: Check Python package
        run: cargo xtask python-package-check

  release_wheels:
    name: Release Wheels
    needs: changes
    if: needs.changes.outputs.release_wheel == 'true'
    uses: ./.github/workflows/pypi-build.yml

  diagnostics_wheel:
    name: Diagnostics Wheel
    needs: changes
    if: needs.changes.outputs.diagnostics == 'true'
    uses: ./.github/workflows/testpypi-diagnostics-build.yml

  core-ci:
    name: Core CI
    needs:
      - changes
      - rust
      - python-package
      - release_wheels
      - diagnostics_wheel
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not pass: ${{ needs.changes.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.release_wheel }}" = "true" ] &&
             [ "${{ needs.release_wheels.result }}" != "success" ]; then
            echo "Release Wheels did not pass: ${{ needs.release_wheels.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.diagnostics }}" = "true" ] &&
             [ "${{ needs.diagnostics_wheel.result }}" != "success" ]; then
            echo "Diagnostics Wheel did not pass: ${{ needs.diagnostics_wheel.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes detected"
            exit 0
          fi

          if [ "${{ needs.rust.result }}" != "success" ]; then
            echo "Rust Checks did not pass: ${{ needs.rust.result }}"
            exit 1
          fi

          if [ "${{ needs.python-package.result }}" != "success" ]; then
            echo "Python Package did not pass: ${{ needs.python-package.result }}"
            exit 1
          fi
