name: Core CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - 'xtask/**'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust Checks
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal --component rustfmt,clippy
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-ci

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check Rust API documentation
        run: |
          cargo doc --workspace --no-deps
          test ! -e target/doc/delta_funnel/progress/index.html
          if rg --quiet 'ProgressReporter|delta_lake_with_progress|preview_table_with_progress|dry_run_to_mssql_with_progress|dry_run_all_to_mssql_with_progress|write_to_mssql_with_progress|write_all_with_progress|write_all_for_stream_benchmark' target/doc/delta_funnel; then
            echo "hidden host integration API appeared in normal rustdoc"
            exit 1
          fi

      - name: Check whitespace
        run: git diff --check

  python-package:
    name: Python Package
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: core-ci

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crates/delta-funnel-python/pyproject.toml

      - name: Install Python build tooling
        run: python -m pip install "maturin>=1.11,<2"

      - name: Check Python package
        run: cargo xtask python-package-check

  core-ci:
    name: Core CI
    needs:
      - changes
      - rust
      - python-package
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Detect Changes did not pass: ${{ needs.changes.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes detected"
            exit 0
          fi

          if [ "${{ needs.rust.result }}" != "success" ]; then
            echo "Rust Checks did not pass: ${{ needs.rust.result }}"
            exit 1
          fi

          if [ "${{ needs.python-package.result }}" != "success" ]; then
            echo "Python Package did not pass: ${{ needs.python-package.result }}"
            exit 1
          fi
