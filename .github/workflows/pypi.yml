name: PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_to:
        description: "Publish target"
        required: true
        type: choice
        default: none
        options:
          - none
          - testpypi
          - pypi
      version:
        description: "Expected package version, such as 0.1.0 or v0.1.0"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/pypi-build.yml
    with:
      publish_to: ${{ inputs.publish_to || 'none' }}
      version: ${{ inputs.version || '' }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi-release
      url: https://test.pypi.org/project/deltafunnel/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v7
        with:
          pattern: deltafunnel-*-wheel
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_to == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi-release
      url: https://pypi.org/project/deltafunnel/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v7
        with:
          pattern: deltafunnel-*-wheel
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
