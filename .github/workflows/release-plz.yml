name: Release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release-pr:
    name: Release-plz PR
    if: >-
      github.event_name == 'push' &&
      github.repository_owner == 'mag1cfrog' &&
      vars.RELEASE_PLZ_PR_ENABLED == 'true' &&
      !contains(github.event.head_commit.message, 'chore: release v')
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Configure Cargo target
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/release-plz-target" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-plz
          cache-directories: |
            ${{ runner.temp }}/release-plz-target

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

  release:
    name: Release-plz release
    if: >-
      github.repository_owner == 'mag1cfrog' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, 'chore: release v'))
      )
    runs-on: ubuntu-latest
    environment: crates-io-release
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Configure Cargo target
        run: echo "CARGO_TARGET_DIR=${RUNNER_TEMP}/release-plz-target" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-plz
          cache-directories: |
            ${{ runner.temp }}/release-plz-target

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
