name: TestPyPI diagnostics

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/testpypi-diagnostics.yml"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/delta-funnel/**"
      - "crates/delta-funnel-python/**"
      - "tools/perfetto/**"
      - "xtask/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: testpypi-diagnostics
  cancel-in-progress: false

jobs:
  build:
    name: Build diagnostics wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      package-version: ${{ steps.package-version.outputs.python-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Read Rust version
        id: rust-version
        run: |
          version="$(sed -n 's/^rust-version = "\(.*\)"/\1/p' Cargo.toml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: |
          rustup toolchain install "${{ steps.rust-version.outputs.version }}" --profile minimal
          rustup default "${{ steps.rust-version.outputs.version }}"

      - name: Prepare diagnostics package version
        id: package-version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          base="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)"
          if [[ $base =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            echo "workspace version must be a stable major.minor.patch version: $base"
            exit 1
          fi

          printf -v padded_run_number '%04d' "$((RUN_NUMBER % 10000))"
          dev_number="$(date -u +%Y%m%d%H%M%S)${padded_run_number}"
          next_patch="$((patch + 1))"
          cargo_version="${major}.${minor}.${next_patch}-dev.${dev_number}"
          python_version="${major}.${minor}.${next_patch}.dev${dev_number}"

          python3 - "$base" "$cargo_version" <<'PY'
          import sys
          from pathlib import Path

          base, diagnostics = sys.argv[1:]

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              contents = file_path.read_text()
              if contents.count(old) != 1:
                  raise SystemExit(f"expected exactly one {old!r} in {path}")
              file_path.write_text(contents.replace(old, new))

          replace_once(
              "Cargo.toml",
              f'version = "{base}"',
              f'version = "{diagnostics}"',
          )
          replace_once(
              "crates/delta-funnel-python/Cargo.toml",
              f'delta-funnel = {{ path = "../delta-funnel", version = "{base}" }}',
              f'delta-funnel = {{ path = "../delta-funnel", version = "{diagnostics}" }}',
          )
          PY

          echo "cargo-version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "python-version=$python_version" >> "$GITHUB_OUTPUT"

      - name: Set up build Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: testpypi-diagnostics-linux-x86-64

      - name: Build diagnostics wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          maturin-version: v1.13.3
          rust-toolchain: ${{ steps.rust-version.outputs.version }}
          manylinux: "2_28"
          sccache: "true"
          before-script-linux: dnf install -y openssl-devel
          args: >-
            --release
            --out dist
            --manifest-path crates/delta-funnel-python/Cargo.toml
            --features perfetto-profile
            --compatibility pypi
            --target-dir target
            -i python3.10

      - name: Reset cache ownership
        run: |
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          if [ -d target ]; then
            sudo chown -R "$USER:$(id -gn)" target
          fi

      - name: Verify diagnostics wheel
        env:
          EXPECTED_VERSION: ${{ steps.package-version.outputs.python-version }}
        run: |
          mapfile -t wheels < <(find dist -maxdepth 1 -type f -name '*.whl' -print)
          if (( ${#wheels[@]} != 1 )); then
            echo "expected exactly one wheel, found ${#wheels[@]}"
            exit 1
          fi

          tools/perfetto/check-diagnostics-wheel "${wheels[0]}"
          python3 - "${wheels[0]}" "$EXPECTED_VERSION" <<'PY'
          import email.parser
          import sys
          import zipfile

          wheel_path, expected_version = sys.argv[1:]
          with zipfile.ZipFile(wheel_path) as wheel:
              metadata_paths = [
                  name
                  for name in wheel.namelist()
                  if name.endswith(".dist-info/METADATA")
              ]
              if len(metadata_paths) != 1:
                  raise SystemExit("expected exactly one METADATA file")
              metadata = email.parser.Parser().parsestr(
                  wheel.read(metadata_paths[0]).decode()
              )

          if metadata["Version"] != expected_version:
              raise SystemExit(
                  f"expected wheel version {expected_version}, got {metadata['Version']}"
              )
          PY

      - name: Upload diagnostics wheel
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: deltafunnel-testpypi-diagnostics-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish diagnostics wheel to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi-diagnostics
      url: https://test.pypi.org/project/deltafunnel/${{ needs.build.outputs.package-version }}/
    permissions:
      contents: read
      id-token: write # Required for TestPyPI Trusted Publishing.

    steps:
      - name: Download diagnostics wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: deltafunnel-testpypi-diagnostics-wheel
          path: dist

      - name: Publish diagnostics wheel
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
