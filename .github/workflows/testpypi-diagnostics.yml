name: TestPyPI diagnostics

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/testpypi-diagnostics.yml"
      - ".github/workflows/testpypi-diagnostics-build.yml"
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/delta-funnel/**"
      - "crates/delta-funnel-python/**"
      - "tools/perfetto/**"
      - "xtask/Cargo.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/testpypi-diagnostics-build.yml

  publish:
    name: Publish diagnostics wheel to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi-diagnostics
      url: https://test.pypi.org/project/deltafunnel/${{ needs.build.outputs.package-version }}/
    permissions:
      contents: read
      id-token: write # Required for TestPyPI Trusted Publishing.

    steps:
      - name: Download diagnostics wheel
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: deltafunnel-testpypi-diagnostics-wheel
          path: dist

      - name: Publish diagnostics wheel
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
