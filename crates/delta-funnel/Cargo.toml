[package]
name = "delta-funnel"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Export Delta Lake tables into Microsoft SQL Server efficiently"
keywords = ["delta", "arrow", "mssql", "sql-server"]
categories = ["database"]

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
arrow-tiberius = "0.1.0"
datafusion = { version = "53.1.0", default-features = false, features = [
    "sql",
] }
delta_kernel = { version = "0.23.0", default-features = false, features = [
    "arrow",
    "default-engine-native-tls",
    "internal-api",
] }
snafu = "0.9"
