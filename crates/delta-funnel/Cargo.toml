[package]
name = "delta-funnel"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Export Delta Lake tables into Microsoft SQL Server efficiently"
keywords = ["delta", "arrow", "mssql", "sql-server"]
categories = ["database"]

[lints]
workspace = true

[dependencies]
async-trait = "0.1"
arrow-tiberius = "0.1.0"
chrono = { version = "0.4", default-features = false, features = ["std"] }
datafusion = { version = "53.1.0", default-features = false, features = [
    "sql",
] }
delta_kernel = { version = "0.23.0", default-features = false, features = [
    "arrow",
    "default-engine-native-tls",
    "internal-api",
] }
libc = "0.2"
snafu = "0.9"

[dev-dependencies]
futures-util = "0.3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61.2", features = ["Win32_System_SystemInformation"] }
