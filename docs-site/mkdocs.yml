site_name: Delta Funnel
site_url: https://mag1cfrog.github.io/delta-funnel/
site_description: Lightweight Rust and Python toolkit for fast Delta Lake to SQL Server loads with DataFusion SQL and native TDS bulk writes, without Spark or ODBC.
repo_name: mag1cfrog/delta-funnel
repo_url: https://github.com/mag1cfrog/delta-funnel

theme:
  name: material
  variant: modern
  features:
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Start here:
      - Overview: index.md
      - Installation: install.md
      - Python quickstart: python-api-walkthrough.md
      - Rust quickstart: rust-quickstart.md
      - Core concepts: concepts.md
  - Core workflows:
      - SQL Server writes: sql-server.md
      - Dry runs and reports: dry-runs-reports.md
  - Advanced workflows:
      - Multiple outputs and shared caching: advanced/multiple-outputs.md
      - Progress displays: progress.md
      - Private S3 sources: advanced/private-s3.md
      - Python logging: advanced/python-logging.md
      - Failure diagnostics: advanced/failure-diagnostics.md
  - Reference:
      - API references: reference/api.md
  - Contributors:
      - Development:
          - Local development: contributing/development.md
          - SQL Server integration tests: contributing/sql-server-tests.md
      - Delta internals:
          - DataFusion and Delta overview: internals/datafusion-delta.md
          - Scan partition planning: internals/scan-partition-planning.md
          - Provider read scheduling: internals/provider-read-scheduling.md
      - Performance:
          - Delta scan benchmarks: contributing/scan-benchmarks.md
