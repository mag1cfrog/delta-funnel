site_name: Delta Funnel
site_url: https://mag1cfrog.github.io/delta-funnel/
site_description: Lightweight Rust and Python toolkit for fast Delta Lake to SQL Server loads with DataFusion SQL and native TDS bulk writes, without Spark or ODBC.
repo_name: mag1cfrog/delta-funnel
repo_url: https://github.com/mag1cfrog/delta-funnel

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - User guide:
      - Overview: index.md
      - Installation: install.md
      - Python API walkthrough: python-api-walkthrough.md
      - Concepts: concepts.md
      - SQL Server: sql-server.md
      - Dry runs and reports: dry-runs-reports.md
  - Internals:
      - DataFusion and Delta: internals/datafusion-delta.md
  - Reference:
      - API references: reference/api.md
